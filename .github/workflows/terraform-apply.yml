name: Terraform Apply

on:
#   push:
#     branches: [ master ]
#     paths:
#       - 'environments/**'
#       - 'modules/**'
#       - '*.hcl'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod
      component:
        description: 'Component to deploy (or "all")'
        default: 'all'
        type: choice
        options:
          - all
          - ecr
          - ses
          - vpc
          - eks-cluster
          - eks-addons
          - eks-irsa
          - rds-cluster
          - rds-database-factory
          - elasticache
          - memorydb
          - msk
          - kafka-topics
          - keyspace

env:
  TERRAGRUNT_VERSION: ${{ vars.TERRAGRUNT_VERSION }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

jobs:
  determine-scope:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.scope.outputs.environment }}
      component: ${{ steps.scope.outputs.component }}
      changes_detected: ${{ steps.scope.outputs.changes_detected }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine deploy scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            COMPONENT="${{ github.event.inputs.component }}"

            echo "environment=$ENV" >> $GITHUB_OUTPUT
            echo "component=$COMPONENT" >> $GITHUB_OUTPUT
            echo "changes_detected=true" >> $GITHUB_OUTPUT

          else
            # Guard against zero-SHA on force push or first push
            if [ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- environments/)
            else
              CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- environments/)
            fi

            # Extract unique environments that changed
            ENVS=$(echo "$CHANGED_FILES" | grep -oP 'environments/\K[^/]+' | sort -u)
            ENV_COUNT=$(echo "$ENVS" | grep -c . || true)

            if [ "$ENV_COUNT" -eq 0 ]; then
              echo "changes_detected=false" >> $GITHUB_OUTPUT
              echo "No environment changes detected"
              exit 0
            fi

            # Let terragrunt resolve which components changed and their ordering
            # If changes span multiple environments, we still apply per-env
            FIRST_ENV=$(echo "$ENVS" | head -1)
            echo "environment=$FIRST_ENV" >> $GITHUB_OUTPUT
            echo "component=all" >> $GITHUB_OUTPUT
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          fi

  apply:
    needs: determine-scope
    if: needs.determine-scope.outputs.changes_detected == 'true'
    runs-on: ubuntu-latest

    environment:
      name: ${{ needs.determine-scope.outputs.environment }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Terragrunt Setup
        uses: ./.github/actions/terragrunt-setup
        with:
          terraform-version: ${{ env.TERRAFORM_VERSION }}
          terragrunt-version: ${{ env.TERRAGRUNT_VERSION }}
          aws-region: ${{ env.AWS_REGION }}
          aws-role: ${{ env.AWS_ROLE_ARN }}

      - name: Terragrunt Apply
        run: |
          ENV="${{ needs.determine-scope.outputs.environment }}"
          COMPONENT="${{ needs.determine-scope.outputs.component }}"

          if [ "$COMPONENT" == "all" ]; then
            cd "environments/$ENV"
            terragrunt run-all apply --terragrunt-non-interactive
          else
            cd "environments/$ENV/$COMPONENT"
            terragrunt init
            terragrunt apply -auto-approve
          fi
