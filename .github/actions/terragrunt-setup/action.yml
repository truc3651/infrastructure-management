name: 'Terragrunt Setup'
description: 'Setup Terraform, Terragrunt, and provider cache'

inputs:
  terraform-version:
    description: 'Terraform version'
    required: true
  terragrunt-version:
    description: 'Terragrunt version'
    required: true
  aws-region:
    description: 'AWS region'
    required: true
  aws-role:
    description: 'AWS role to assume'
    required: true

runs:
  using: "composite"
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role }}
        aws-region: ${{ inputs.aws-region }}
        role-session-name: GitHubActions-Terraform

    - name: Terraform Setup
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false

    - name: Cache Terragrunt binary
      id: cache-tg
      uses: actions/cache@v4
      with:
        path: /usr/local/bin/terragrunt
        key: terragrunt-${{ inputs.terragrunt-version }}

    - name: Install Terragrunt
      if: steps.cache-tg.outputs.cache-hit != 'true'
      shell: bash
      run: |
        wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.terragrunt-version }}/terragrunt_linux_amd64
        chmod +x terragrunt_linux_amd64
        sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

    - name: Verify Terragrunt
      shell: bash
      run: terragrunt --version

    - name: Cache Terraform providers
      uses: actions/cache@v4
      with:
        path: ~/.terraform.d/plugin-cache
        key: terraform-providers-${{ inputs.terraform-version }}-${{ hashFiles('**/.terraform.lock.hcl') }}
        restore-keys: |
          terraform-providers-${{ inputs.terraform-version }}-

    - name: Configure Terraform plugin cache
      shell: bash
      run: |
        mkdir -p ~/.terraform.d/plugin-cache
        echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> $GITHUB_ENV